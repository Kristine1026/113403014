<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Task</title>
    <style>
        /* 基礎背景設定 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #58b2f1; /* 藍色底色 */
            display: flex;
            justify-content: center;
            font-family: sans-serif;
        }

        /* 白色外容器 */
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px; /* 限制最大寬度方便觀察 */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 綠色區塊 (Header) */
        .header {
            background-color: #a8d64d;
            height: 120px;
            width: 100%;
        }

        /* 中間藍綠色區塊 (Main) */
        .main-content {
            display: flex;
            gap: 10px;
            /* 預設：寬螢幕時橫排 (圖b) */
            flex-direction: row; 
        }

        .box-cyan {
            background-color: #00bcd4;
            height: 150px;
            flex: 1; /* 平分寬度 */
        }

        /* 底部灰色區塊 (Footer) */
        .footer {
            display: flex;
            gap: 10px;
        }

        .box-gray {
            background-color: #eceff1;
            height: 60px;
            flex: 1;
        }

        /* --- 關鍵：當寬度小於 480px 時 (圖a) --- */
        @media (max-width: 480px) {
            .main-content {
                /* 強制改為垂直排列 */
                flex-direction: column !important; 
            }

            .box-cyan {
                height: 80px; /* 縮小高度符合手機視覺 */
            }

            .footer {
                /* 手機版底部也可以根據需求調整排列 */
                flex-wrap: wrap;
            }
            .box-gray {
                flex: 1 1 40%; /* 讓它變成兩列兩排 */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header"></div>

        <div class="main-content">
            <div class="box-cyan"></div>
            <div class="box-cyan"></div>
            <div class="box-cyan"></div>
        </div>

        <div class="footer">
            <div class="box-gray"></div>
            <div class="box-gray"></div>
            <div class="box-gray"></div>
            <div class="box-gray"></div>
        </div>
    </div>

</body>
</html>
