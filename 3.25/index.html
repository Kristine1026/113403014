<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Hello World Styles</title>
    <style>
        body {
            font-family: serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            background-color: #f0f0f0;
        }

        .container {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .box {
            width: 500px;
            margin: 20px 0;
            padding: 10px;
            font-size: 32px;
            font-weight: bold;
        }

        /* 第一個方塊：淺藍背景，橘紅色雙線邊框 */
        .box-1 {
            background-color: #add8e6; /* LightBlue */
            border: 5px double #ff6347; /* Tomato / Coral */
            color: black;
        }

        /* 第二個方塊：黃色背景，藍色圓角邊框 */
        .box-2 {
            background-color: #ffff00; /* Yellow */
            border: 2px solid #1e90ff; /* DodgerBlue */
            border-radius: 15px;
            color: black;
        }

        /* 第三個方塊：綠色背景，灰色點狀邊框 */
        .box-3 {
            background-color: #3cb371; /* MediumSeaGreen */
            border: 8px dotted #808080; /* Gray */
            color: black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box-1">Hello World</div>
        <div class="box box-2">Hello World</div>
        <div class="box box-3">Hello World</div>
    </div>

</body>
</html>
