<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>作業 1 - 表單實作</title>
    <style>
        /* 基礎版面設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 1.6;
        }

        /* 每一組輸入框的間距 */
        .form-group {
            margin-bottom: 20px;
        }

        /* 標題文字樣式 */
        label {
            display: block;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        /* 輸入框樣式 */
        input[type="text"] {
            width: 300px;
            padding: 5px;
            font-size: 1.1em;
            border: 1px solid #767676;
        }

        /* 按鈕群組排版 */
        .buttons {
            margin-top: 30px;
        }

        /* 關鍵修改：讓 Submit 與 重設 按鈕大小一致 */
        input[type="submit"], input[type="reset"] {
            width: 85px;         /* 固定寬度 */
            height: 35px;        /* 固定高度 */
            font-size: 1em;
            cursor: pointer;
            margin-right: 5px;   /* 兩個按鈕之間的間距 */
            text-align: center;
        }
    </style>
</head>
<body>

    <form>
        <div class="form-group">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" value="Your first name">
        </div>

        <div class="form-group">
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" value="Your last name">
        </div>

        <div class="form-group">
            <label for="sid">Student ID:</label>
            <input type="text" id="sid" name="sid" value="Your student ID">
        </div>

        <div class="buttons">
            <input type="submit" value="Submit">
            
            <input type="reset" value="重設">
        </div>
    </form>

</body>
</html>
