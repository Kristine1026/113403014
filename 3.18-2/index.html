<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>作業 1 - 表單建立</title>
    <style>
        /* 簡單的排版，讓它看起來像圖片一樣換行 */
        form {
            line-height: 2;
        }
        input[type="text"] {
            display: block;
            margin-bottom: 15px;
            width: 250px;
        }
        .button-group {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <form>
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname" value="可筠">

        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname" value="廖">

        <label for="sid">Student ID:</label>
        <input type="text" id="sid" name="sid" value="113403014">

        <div class="button-group">
            <input type="submit" value="Submit">
            <input type="reset" value="重設">
        </div>
    </form>

</body>
</html>
