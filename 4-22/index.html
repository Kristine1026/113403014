<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Spec Implementation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎背景設定 */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f6f6f6; /* 參考設計稿標註的 header bg color */
        }

        /* 根據 Spec 製作的按鈕樣式 */
        .spec-button {
            /* 尺寸與形狀：h22 / R8 */
            height: 22px;
            border-radius: 8px;
            
            /* 背景與邊框：background #ffffff / outline 1px #2f2f2f */
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            
            /* 字體樣式：Roboto Regular 13px / Color #2f2f2f */
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            font-weight: 400;
            
            /* 內部對齊與間距 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px; /* 根據文字長度手動微調左右邊距 */
            
            /* 其他互動設定 */
            cursor: pointer;
            outline: none;
            box-sizing: border-box; /* 確保 1px 邊框不會增加總高度 */
            transition: background-color 0.2s;
            line-height: 1;
        }

        /* 滑鼠懸停效果 (選配，增加操作感) */
        .spec-button:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <button class="spec-button">查看資訊</button>

</body>
</html>
