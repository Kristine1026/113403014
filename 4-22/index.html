<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCU Web Development - Button Interaction</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎版面設定 */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f6f6;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        /* 預覽區塊容器 (對應中間 496 寬度的區塊) */
        .container {
            width: 496px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            position: relative;
            overflow: hidden;
        }

        /* 上方預覽圖 */
        .preview-area {
            position: relative;
            width: 496px;
            height: 240px;
            background: #eee;
        }

        .preview-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 按鈕容器：放置在圖片右上角 */
        .button-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        /* 核心按鈕規格：h22 / R8 */
        .spec-button {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            font-weight: 400;
            padding: 0 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            outline: none;
            transition: background 0.2s;
        }

        .spec-button:hover {
            background-color: #f0f0f0;
        }

        /* 下方詳細資訊面板 (對應右下角圖片狀態) */
        .info-panel {
            max-height: 0; /* 預設隱藏 */
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background: #ffffff;
        }

        /* 當面板啟動時的高度 */
        .info-panel.show {
            max-height: 300px;
        }

        .info-list {
            padding: 10px 20px;
            border-top: 1px solid #eaeaea;
        }

        /* 綠色條狀資訊樣式 */
        .info-item {
            background-color: #90ee90; /* 模擬設計稿中的淺綠色背景 */
            color: #2f2f2f;
            font-size: 12px;
            padding: 4px 8px;
            margin-bottom: 5px;
            border-radius: 2px;
        }

        /* 捲軸模擬 (如圖標註 Scrolling bar) */
        .scroll-container {
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="preview-area">
            <img src="https://picsum.photos/496/240" alt="Landscape Preview">
            
            <div class="button-overlay">
                <button class="spec-button" id="toggleBtn">查看資訊</button>
            </div>
        </div>

        <div class="info-panel" id="infoPanel">
            <div class="info-list">
                <div class="scroll-container">
                    <div class="info-item">修改日期：2017/10/12</div>
                    <div class="info-item">類別：JPG</div>
                    <div class="info-item">大小：466.97KB</div>
                    <div class="info-item">路徑：\\designcenter.qnap.com.tw\DesignCenter\PM...</div>
                    <div class="info-item">解析度：450 x 240</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const panel = document.getElementById('infoPanel');

        // 點擊事件監聽
        btn.addEventListener('click', () => {
            // 切換 panel 的顯示類別
            panel.classList.toggle('show');

            // 切換按鈕文字：對應右下角的「收起資訊」
            if (panel.classList.contains('show')) {
                btn.textContent = '收起資訊';
            } else {
                btn.textContent = '查看資訊';
            }
        });
    </script>

</body>
</html>
